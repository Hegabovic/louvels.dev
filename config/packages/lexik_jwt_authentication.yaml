lexik_jwt_authentication:
    secret_key: '%kernel.project_dir%/config/jwt/private.pem'     # Required for token generation
    public_key: '%kernel.project_dir%/config/jwt/public.pem'      # Required for token verification
    pass_phrase: '%env(JWT_PASSPHRASE)%'                         # Passphrase for the private key
    token_ttl: 3600                                              # Token TTL in seconds (1 hour)
    user_id_claim: email                                        # Key used to identify the user
    
    # Token extraction settings
    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
        cookie:
            enabled: false
        query_parameter:
            enabled: false
# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    restcountries.base_url: '%env(RESTCOUNTRIES_BASE_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        
        # Bind interfaces to implementations
        bind:
            App\Integration\RestCountries\Adapter\RestCountriesAdapterInterface: '@App\Integration\RestCountries\Adapter\RestCountriesAdapter'
            App\Repository\CountryRepositoryInterface: '@App\Repository\CountryRepository'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Tag all request validators
    App\Validator\RequestValidatorInterface:
        tags: ['app.request_validator']

    # Configure the request validator subscriber
    App\EventSubscriber\RequestValidatorSubscriber:
        arguments:
            $validators: !tagged_iterator app.request_validator

    App\Integration\RestCountries\Endpoints\AllRestCountriesEndpoint:
        arguments:
            $baseUrl: '%restcountries.base_url%'
